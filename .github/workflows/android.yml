name: Nexus Plus — Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'NexusPlus/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'NexusPlus/**'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper execute permission
        run: chmod +x NexusPlus/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('NexusPlus/**/*.gradle*', 'NexusPlus/**/gradle-wrapper.properties', 'NexusPlus/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run unit tests
        working-directory: NexusPlus
        run: ./gradlew test --no-daemon

      - name: Build Debug APK
        working-directory: NexusPlus
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-plus-debug-${{ github.run_number }}
          path: NexusPlus/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper execute permission
        run: chmod +x NexusPlus/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('NexusPlus/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK (unsigned)
        working-directory: NexusPlus
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-plus-release-unsigned-${{ github.run_number }}
          path: NexusPlus/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
