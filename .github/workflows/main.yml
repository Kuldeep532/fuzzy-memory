Name: Android CI (Compile & Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x NexusPlus/gradlew

    # बिना स्टोर फ़ाइल के टेस्टिंग के लिए Unsigned Debug APK बनाना
    - name: Compile and Build Debug APK (Unsigned)
      working-directory: ./NexusPlus
      run: ./gradlew assembleDebug --stacktrace
      
    # यूनिट टेस्ट रन करना
    - name: Run Unit Tests
      working-directory: ./NexusPlus
      run: ./gradlew testDebugUnitTest --stacktrace

    # बनने वाले APK को डाउनलोड करने के लिए अपलोड करना
    - name: Upload Debug APK for Testing
      uses: actions/upload-artifact@v4
      with:
        name: nexusplus-debug-apk
        path: NexusPlus/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

