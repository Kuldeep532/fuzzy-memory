name: Build NexusPlus
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NexusPlus
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      KEYSTORE_BASE64:       ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD:     ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS:             ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD:          ${{ secrets.KEY_PASSWORD }}
      ADMOB_APP_ID:          ${{ secrets.ADMOB_APP_ID }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Verify Required Secrets
        run: |
          MISSING=""
          [ -z "$GOOGLE_SERVICES_JSON" ] && MISSING="$MISSING GOOGLE_SERVICES_JSON"
          [ -z "$KEYSTORE_BASE64" ]      && MISSING="$MISSING KEYSTORE_BASE64"
          [ -z "$KEYSTORE_PASSWORD" ]    && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "$KEY_ALIAS" ]            && MISSING="$MISSING KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ]         && MISSING="$MISSING KEY_PASSWORD"
          [ -z "$ADMOB_APP_ID" ]         && MISSING="$MISSING ADMOB_APP_ID"
          if [ -n "$MISSING" ]; then
            echo "Error: Missing secrets:$MISSING"
            exit 1
          fi
          echo "All secrets OK."
      - name: Grant Gradlew Permission
        run: chmod +x gradlew
      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'apk' }}
        run: ./gradlew assembleRelease
      - name: Build Release AAB (Play Store)
        if: ${{ github.event.inputs.build_type == 'aab' }}
        run: ./gradlew bundleRelease
      - name: Upload APK
        if: ${{ github.event.inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-APK
          path: NexusPlus/app/build/outputs/apk/release/*.apk
          retention-days: 7
      - name: Upload AAB
        if: ${{ github.event.inputs.build_type == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-AAB
          path: NexusPlus/app/build/outputs/bundle/release/*.aab
          retention-days: 7
      - name: Cleanup Signing Artifacts
        if: always()
        run: rm -rf app/build/signing/
