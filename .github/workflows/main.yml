name: Build NexusPlus

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
      UNITY_GAME_ID: ${{ secrets.UNITY_GAME_ID }}
      NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradlew Permission
        run: |
          cd NexusPlus
          chmod +x gradlew

      - name: Inject Google Services JSON from GitHub Secret
        shell: bash
        run: |
          set -euo pipefail
          cd NexusPlus

          rm -f app/google-services.json
          find . -path './.gradle' -prune -o -path './build' -prune -o -path './*/build' -prune -o -name 'google-services.json' -type f -exec rm -f {} +

          if [ -z "${GOOGLE_SERVICES_JSON}" ]; then
            echo "ERROR: GOOGLE_SERVICES_JSON GitHub Secret is required and must be Base64-encoded." >&2
            exit 1
          fi

          printf '%s' "${GOOGLE_SERVICES_JSON}" | base64 --decode > app/google-services.json
          python3 -m json.tool app/google-services.json > /tmp/google-services.json.validated
          mv /tmp/google-services.json.validated app/google-services.json
          chmod 600 app/google-services.json
          echo "✓ google-services.json injected successfully"

      - name: Setup Keystore File
        run: |
          cd NexusPlus
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          chmod 600 app/release.keystore
          echo "KEYSTORE_PATH=$(pwd)/app/release.keystore" >> $GITHUB_ENV
          echo "✓ Keystore file created at: $KEYSTORE_PATH"

      - name: Export API Keys and Secrets for Build
        shell: bash
        run: |
          echo "Exporting all secrets for Gradle build config injection..."
          echo "GEMINI_API_KEY length: $(echo -n "${GEMINI_API_KEY}" | wc -c) chars"
          echo "WEB_CLIENT_ID length: $(echo -n "${WEB_CLIENT_ID}" | wc -c) chars"
          echo "UNITY_GAME_ID length: $(echo -n "${UNITY_GAME_ID}" | wc -c) chars"
          echo "NASA_API_KEY length: $(echo -n "${NASA_API_KEY}" | wc -c) chars"
          echo "✓ All secrets available for build config injection"

      - name: Build Signed Release APK
        if: github.event.inputs.build_type == 'apk'
        run: |
          cd NexusPlus
          set -eo pipefail
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=${{ env.KEYSTORE_PATH }} \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -PGEMINI_API_KEY="${GEMINI_API_KEY}" \
            -PWEB_CLIENT_ID="${WEB_CLIENT_ID}" \
            -PUNITY_GAME_ID="${UNITY_GAME_ID}" \
            -PNASA_API_KEY="${NASA_API_KEY}" \
            2>&1 | tee build_output.log

      - name: Build Signed Release AAB
        if: github.event.inputs.build_type == 'aab'
        run: |
          cd NexusPlus
          set -eo pipefail
          ./gradlew clean bundleRelease \
            -Pandroid.injected.signing.store.file=${{ env.KEYSTORE_PATH }} \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -PGEMINI_API_KEY="${GEMINI_API_KEY}" \
            -PWEB_CLIENT_ID="${WEB_CLIENT_ID}" \
            -PUNITY_GAME_ID="${UNITY_GAME_ID}" \
            -PNASA_API_KEY="${NASA_API_KEY}" \
            2>&1 | tee build_output.log

      - name: Upload Signed APK
        if: github.event.inputs.build_type == 'apk' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-APK
          path: NexusPlus/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Signed AAB
        if: github.event.inputs.build_type == 'aab' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-AAB
          path: NexusPlus/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: NexusPlus/build_output.log
          if-no-files-found: ignore
          retention-days: 7
