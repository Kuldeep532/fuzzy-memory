name: Android CI (Compile & Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x NexusPlus/gradlew

    - name: Compile and Build Debug APK (Unsigned)
      run: ./NexusPlus/gradlew assembleDebug --stacktrace
      
    - name: Run Unit Tests
      run: ./NexusPlus/gradlew testDebugUnitTest --stacktrace

    # Nayi step: Isse APK seedhe GitHub par upload ho jayega download karne ke liye
    - name: Upload Debug APK for Testing
      uses: actions/upload-artifact@v4
      with:
        name: nexusplus-debug-apk
        path: NexusPlus/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
