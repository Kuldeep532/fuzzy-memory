name: Build NexusPlus

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradlew Permission
        run: |
          cd NexusPlus
          chmod +x gradlew

      - name: Inject Google Services JSON from GitHub Secret
        shell: bash
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          cd NexusPlus

          # Force-clean any workspace, cached, or script-generated Firebase config first.
          rm -f app/google-services.json
          find . -path './.gradle' -prune -o -path './build' -prune -o -path './*/build' -prune -o -name 'google-services.json' -type f -delete

          if [ -z "${GOOGLE_SERVICES_JSON_B64}" ]; then
            echo "GOOGLE_SERVICES_JSON GitHub Secret is required and must be Base64-encoded." >&2
            exit 1
          fi

          printf '%s' "${GOOGLE_SERVICES_JSON_B64}" | base64 --decode > app/google-services.json
          python3 -m json.tool app/google-services.json > /tmp/google-services.json.validated
          mv /tmp/google-services.json.validated app/google-services.json
          chmod 600 app/google-services.json

          # Fail fast if anything recreated a second Firebase config outside the app module.
          duplicate_count=$(find . -path './.gradle' -prune -o -path './build' -prune -o -path './*/build' -prune -o -name 'google-services.json' -type f -print | wc -l | tr -d ' ')
          if [ "${duplicate_count}" != "1" ]; then
            echo "Expected exactly one google-services.json after CI injection; found ${duplicate_count}." >&2
            find . -path './.gradle' -prune -o -path './build' -prune -o -path './*/build' -prune -o -name 'google-services.json' -type f -print >&2
            exit 1
          fi

      # Gradle aapke env variables se khud signed APK banayega
      - name: Build Signed Release APK
        if: github.event.inputs.build_type == 'apk'
        run: |
          cd NexusPlus
          set -eo pipefail
          ./gradlew clean assembleRelease 2>&1 | tee build_output.log

      # Gradle aapke env variables se khud signed AAB banayega
      - name: Build Signed Release AAB
        if: github.event.inputs.build_type == 'aab'
        run: |
          cd NexusPlus
          set -eo pipefail
          ./gradlew clean bundleRelease 2>&1 | tee build_output.log

      - name: Upload Signed APK
        if: github.event.inputs.build_type == 'apk' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-APK
          path: NexusPlus/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Signed AAB
        if: github.event.inputs.build_type == 'aab' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-AAB
          path: NexusPlus/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: NexusPlus/build_output.log
          if-no-files-found: ignore
          retention-days: 7
