name: Build NexusPlus

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NexusPlus
    env:
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is not set" >&2
            exit 1
          fi
          mkdir -p app
          printf '%s' "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json

      - name: Inject Configuration Files
        run: |
          touch local.properties
          echo "admob.app.id=$ADMOB_APP_ID" >> local.properties
          echo "gemini.api.key=$GEMINI_API_KEY" >> local.properties
          echo "ADMOB_APP_ID=$ADMOB_APP_ID" >> local.properties
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> local.properties

      - name: Grant Gradlew Permission
        run: chmod +x gradlew

      - name: Build Unsigned Release APK
        if: github.event.inputs.build_type == 'apk'
        run: |
          set -eo pipefail
          ./gradlew clean assembleRelease 2>&1 | tee build_output.log

      - name: Build Unsigned Release AAB
        if: github.event.inputs.build_type == 'aab'
        run: |
          set -eo pipefail
          ./gradlew clean bundleRelease 2>&1 | tee build_output.log

      - name: Sign APK with r0adkll
        if: github.event.inputs.build_type == 'apk'
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: NexusPlus/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Sign AAB with r0adkll
        if: github.event.inputs.build_type == 'aab'
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: NexusPlus/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        if: github.event.inputs.build_type == 'apk' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-APK
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload Signed AAB
        if: github.event.inputs.build_type == 'aab' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-AAB
          path: ${{ steps.sign_aab.outputs.signedReleaseFile }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: NexusPlus/build_output.log
          if-no-files-found: ignore
          retention-days: 7
