name: Build NexusPlus APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type d

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore google-services.json
        run: |
          mkdir -p NexusPlus/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > NexusPlus/app/google-services.json

      - name: Restore Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > NexusPlus/release.keystore

      - name: Create signing.properties
        run: |
          cat > NexusPlus/signing.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Grant Gradle Permission
        run: |
          cd NexusPlus
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd NexusPlus
          ./gradlew assembleDebug

      - name: Build Release APK
        run: |
          cd NexusPlus
          ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Debug
          path: NexusPlus/**/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release
          path: NexusPlus/**/build/outputs/apk/release/*.apk
