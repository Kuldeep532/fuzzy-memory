name: Build NexusPlus

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradlew Permission
        run: |
          cd NexusPlus
          chmod +x gradlew

      # Gradle aapke env variables se khud signed APK banayega
      - name: Build Signed Release APK
        if: github.event.inputs.build_type == 'apk'
        run: |
          cd NexusPlus
          set -eo pipefail
          ./gradlew clean assembleRelease 2>&1 | tee build_output.log

      # Gradle aapke env variables se khud signed AAB banayega
      - name: Build Signed Release AAB
        if: github.event.inputs.build_type == 'aab'
        run: |
          cd NexusPlus
          set -eo pipefail
          ./gradlew clean bundleRelease 2>&1 | tee build_output.log

      - name: Upload Signed APK
        if: github.event.inputs.build_type == 'apk' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-APK
          path: NexusPlus/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Signed AAB
        if: github.event.inputs.build_type == 'aab' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-AAB
          path: NexusPlus/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: NexusPlus/build_output.log
          if-no-files-found: ignore
          retention-days: 7
