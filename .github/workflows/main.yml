name: Build NexusPlus APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: NexusPlus

    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Securely Inject Keystore
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is missing."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Verify Environment Secrets
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ] || [ -z "$ADMOB_APP_ID" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Error: One or more critical build secrets are missing."
            exit 1
          fi
          echo "All secrets successfully verified."

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Production APK
        run: ./gradlew assembleRelease

      - name: Clean Up Sensitive Build Artifacts
        if: always()
        run: rm -f app/release.keystore

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-APK
          path: NexusPlus/app/build/outputs/apk/release/*.apk
          retention-days: 1
