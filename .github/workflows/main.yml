name: Build NexusPlus
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NexusPlus
    env:
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        
      - name: Inject Configuration Files
        run: |
          mkdir -p app
          # Base64 decode for google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json
          
          # Create key.properties to prevent Gradle build from skipping/failing on missing signing configuration
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
          echo "storeFile=release.keystore" >> key.properties
          
          # Decode Keystore binary file inside app directory
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          
          # Inject Environment local properties
          touch local.properties
          echo "admob.app.id=$ADMOB_APP_ID" >> local.properties
          echo "gemini.api.key=$GEMINI_API_KEY" >> local.properties
          echo "ADMOB_APP_ID=$ADMOB_APP_ID" >> local.properties
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> local.properties
          
      - name: Grant Gradlew Permission
        run: chmod +x gradlew
        
      - name: Build Release APK
        if: github.event.inputs.build_type == 'apk'
        run: |
          set -eo pipefail
          ./gradlew clean assembleRelease 2>&1 | tee build_output.log
          
      - name: Build Release AAB
        if: github.event.inputs.build_type == 'aab'
        run: |
          set -eo pipefail
          ./gradlew clean bundleRelease 2>&1 | tee build_output.log
          
      - name: Sign Artifacts (No Gradle Edit Mode)
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: NexusPlus/app/build/outputs/${{ github.event.inputs.build_type == 'apk' && 'apk/release' || 'bundle/release' }}
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          
      - name: Upload Signed APK
        if: github.event.inputs.build_type == 'apk' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-APK
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: error
          retention-days: 7
          
      - name: Upload Signed AAB
        if: github.event.inputs.build_type == 'aab' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-AAB
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: error
          retention-days: 7
          
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: NexusPlus/build_output.log
          if-no-files-found: ignore
          retention-days: 7
