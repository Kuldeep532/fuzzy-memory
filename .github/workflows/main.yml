# =============================================================================
#  NEXUS PLUS — GitHub Actions CI/CD Pipeline
#  Production-ready | Secrets-driven | Google Play ready
#
#  Triggers:
#    • push to main / master  → full build + sign + artifact upload
#    • pull_request            → compile + lint check (no signing)
#    • workflow_dispatch       → manual trigger with optional deploy flag
#
#  Required GitHub Repository Secrets (Settings → Secrets → Actions):
#  ─────────────────────────────────────────────────────────────────────
#  KEYSTORE_BASE64          Base64-encoded nexusplus-upload-key.jks
#  KEYSTORE_PASSWORD        Keystore store password
#  KEY_ALIAS                Key alias (NexusPlus)
#  KEY_PASSWORD             Key entry password
#
#  Optional — Firebase App Distribution:
#  FIREBASE_TOKEN           Firebase CLI token  (firebase login:ci)
#  FIREBASE_APP_ID          Firebase Android App ID  (1:xxx:android:xxx)
#  GOOGLE_SERVICES_JSON     Base64-encoded google-services.json
#
#  Optional — Additional API keys embedded as BuildConfig fields:
#  MAPS_API_KEY             Google Maps / Places API key
#  BACKEND_BASE_URL         Your REST API base URL
#  BACKEND_AUTH_TOKEN       Server-to-server auth token
# =============================================================================

name: NexusPlus CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_to_firebase:
        description: 'Deploy to Firebase App Distribution after build?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Cancel any in-progress run on the same branch to avoid wasted minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx4g -XX:MaxMetaspaceSize=512m'
  ANDROID_PROJECT_DIR: NexusPlus

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build, lint, sign, and produce release artifacts
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Sign Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java / JDK ────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # ── 3. Gradle permission ─────────────────────────────────────────────
      - name: Grant Gradle wrapper execute permission
        run: chmod +x ${{ env.ANDROID_PROJECT_DIR }}/gradlew

      # ── 4. Gradle cache ──────────────────────────────────────────────────
      - name: Cache Gradle dependencies & build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.ANDROID_PROJECT_DIR }}/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/libs.versions.toml', '**/build.gradle.kts', '**/settings.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 5. Decode keystore from Base64 secret ────────────────────────────
      #
      #  How to generate KEYSTORE_BASE64:
      #    Linux/macOS:  base64 -w 0 nexusplus-upload-key.jks
      #    Windows PS:   [Convert]::ToBase64String([IO.File]::ReadAllBytes("nexusplus-upload-key.jks"))
      #
      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > ${{ env.ANDROID_PROJECT_DIR }}/app/nexusplus-upload-key.jks
          echo "✅ Keystore decoded → $(du -sh ${{ env.ANDROID_PROJECT_DIR }}/app/nexusplus-upload-key.jks | cut -f1)"

      # ── 6. (Optional) Decode google-services.json for Firebase ───────────
      - name: Decode google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
            > ${{ env.ANDROID_PROJECT_DIR }}/app/google-services.json
          echo "✅ google-services.json decoded"

      # ── 7. Lint check ─────────────────────────────────────────────────────
      - name: Run Android Lint
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        run: ./gradlew lintRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: ${{ env.ANDROID_PROJECT_DIR }}/app/build/reports/lint-results-release.html
          if-no-files-found: ignore

      # ── 8. Build Release APK ─────────────────────────────────────────────
      - name: Build Release APK
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        env:
          SIGNING_STORE_FILE:     app/nexusplus-upload-key.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          MAPS_API_KEY:           ${{ secrets.MAPS_API_KEY }}
          BACKEND_BASE_URL:       ${{ secrets.BACKEND_BASE_URL }}
          BACKEND_AUTH_TOKEN:     ${{ secrets.BACKEND_AUTH_TOKEN }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.testInstrumentationRunnerArguments.disableAnalytics=true
          echo "✅ Release APK built"
          ls -lh app/build/outputs/apk/release/

      # ── 9. Build Release AAB (Android App Bundle — for Play Store) ────────
      - name: Build Release AAB
        working-directory: ${{ env.ANDROID_PROJECT_DIR }}
        env:
          SIGNING_STORE_FILE:     app/nexusplus-upload-key.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          MAPS_API_KEY:           ${{ secrets.MAPS_API_KEY }}
          BACKEND_BASE_URL:       ${{ secrets.BACKEND_BASE_URL }}
          BACKEND_AUTH_TOKEN:     ${{ secrets.BACKEND_AUTH_TOKEN }}
        run: |
          ./gradlew bundleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.testInstrumentationRunnerArguments.disableAnalytics=true
          echo "✅ Release AAB built"
          ls -lh app/build/outputs/bundle/release/

      # ── 10. Extract build metadata ────────────────────────────────────────
      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' ${{ env.ANDROID_PROJECT_DIR }}/app/build.gradle.kts | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' ${{ env.ANDROID_PROJECT_DIR }}/app/build.gradle.kts | grep -oP '\d+')
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION_NAME} (${VERSION_CODE})"

      # ── 11. Upload APK artifact ───────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-v${{ steps.version.outputs.version_name }}-release.apk
          path: ${{ env.ANDROID_PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      # ── 12. Upload AAB artifact ───────────────────────────────────────────
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-v${{ steps.version.outputs.version_name }}-release.aab
          path: ${{ env.ANDROID_PROJECT_DIR }}/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      # ── 13. Upload ProGuard mapping (for crash de-obfuscation) ────────────
      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-v${{ steps.version.outputs.version_name }}-mapping.txt
          path: ${{ env.ANDROID_PROJECT_DIR }}/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
          retention-days: 90

      # ── 14. Clean up keystore from runner (security hygiene) ─────────────
      - name: Remove keystore from runner
        if: always()
        run: |
          rm -f ${{ env.ANDROID_PROJECT_DIR }}/app/nexusplus-upload-key.jks
          rm -f ${{ env.ANDROID_PROJECT_DIR }}/app/google-services.json
          echo "🔒 Sensitive files removed from runner"

      # ── 15. Build summary ─────────────────────────────────────────────────
      - name: Write build summary
        if: always()
        run: |
          echo "## 📦 NexusPlus Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build time** | ${{ steps.version.outputs.build_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Firebase App Distribution (runs only on push to main/master)
  #          OR when manually triggered with deploy_to_firebase = 'true'
  # Requires: FIREBASE_TOKEN, FIREBASE_APP_ID secrets to be set.
  # ───────────────────────────────────────────────────────────────────────────
  firebase_distribute:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_firebase == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Grant Gradle wrapper execute permission
        run: chmod +x ${{ env.ANDROID_PROJECT_DIR }}/gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/libs.versions.toml', '**/build.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' ${{ env.ANDROID_PROJECT_DIR }}/app/build.gradle.kts | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' ${{ env.ANDROID_PROJECT_DIR }}/app/build.gradle.kts | grep -oP '\d+')
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: NexusPlus-v${{ steps.version.outputs.version_name }}-release.apk
          path: firebase-dist/

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > ${{ env.ANDROID_PROJECT_DIR }}/app/nexusplus-upload-key.jks

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
            > ${{ env.ANDROID_PROJECT_DIR }}/app/google-services.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute APK via Firebase App Distribution
        env:
          FIREBASE_TOKEN:  ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          APK_PATH=$(ls firebase-dist/*.apk | head -1)
          echo "📤 Distributing: ${APK_PATH}"

          firebase appdistribution:distribute "${APK_PATH}" \
            --app   "${FIREBASE_APP_ID}" \
            --token "${FIREBASE_TOKEN}" \
            --release-notes "NexusPlus v${{ steps.version.outputs.version_name }} — commit ${{ github.sha }} by ${{ github.actor }}" \
            --groups "internal-testers"

          echo "✅ Firebase distribution complete"

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f ${{ env.ANDROID_PROJECT_DIR }}/app/nexusplus-upload-key.jks
          rm -f ${{ env.ANDROID_PROJECT_DIR }}/app/google-services.json
