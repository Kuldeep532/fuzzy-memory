name: Build NexusPlus APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NexusPlus

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Required Secrets
        run: |
          test -n "${{ secrets.GOOGLE_SERVICES_JSON }}" || (echo "ERROR: Missing GOOGLE_SERVICES_JSON secret" && exit 1)
          test -n "${{ secrets.KEYSTORE_BASE64 }}"      || (echo "ERROR: Missing KEYSTORE_BASE64 secret"      && exit 1)
          test -n "${{ secrets.KEYSTORE_PASSWORD }}"    || (echo "ERROR: Missing KEYSTORE_PASSWORD secret"    && exit 1)
          test -n "${{ secrets.KEY_ALIAS }}"            || (echo "ERROR: Missing KEY_ALIAS secret"            && exit 1)
          test -n "${{ secrets.KEY_PASSWORD }}"         || (echo "ERROR: Missing KEY_PASSWORD secret"         && exit 1)

      - name: Restore google-services.json
        run: |
          mkdir -p app
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Restore Keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Create key.properties
        run: |
          printf 'storeFile=release.keystore\n'               > key.properties
          printf 'storePassword=%s\n' "${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
          printf 'keyAlias=%s\n'      "${{ secrets.KEY_ALIAS }}"         >> key.properties
          printf 'keyPassword=%s\n'   "${{ secrets.KEY_PASSWORD }}"      >> key.properties

      - name: Diagnostics
        run: |
          java -version
          ./gradlew --version
          test -f key.properties    && echo "key.properties OK"
          test -f release.keystore  && echo "release.keystore OK"
          test -f app/google-services.json && echo "google-services.json OK"

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # Build debug first, then release — NO 'clean' between them.
      # A fresh CI runner has no stale cache; 'clean' would delete the
      # already-built debug APK before it can be uploaded.
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --warning-mode all --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --warning-mode all --no-daemon

      # if: always() ensures both uploads run even if one build step fails,
      # so you always get whatever was successfully built.
      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Debug
          path: NexusPlus/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Production
          path: NexusPlus/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
