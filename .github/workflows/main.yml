name: Build NexusPlus
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NexusPlus
    env:
      # Isme aapka raw text format json safe rahega
      GOOGLE_SERVICES_JSON_TEXT: ${{ secrets.GOOGLE_SERVICES_JSON }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Safe fallback system variables agar code directly context se uthaye
      admob_app_id: ${{ secrets.ADMOB_APP_ID }}
      gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Required Secrets
        id: check_secrets
        run: |
          MISSING=""
          [ -z "$GOOGLE_SERVICES_JSON_TEXT" ] && MISSING="$MISSING GOOGLE_SERVICES_JSON"
          [ -z "$KEYSTORE_BASE64" ] && MISSING="$MISSING KEYSTORE_BASE64"
          [ -z "$KEYSTORE_PASSWORD" ] && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "$KEY_ALIAS" ] && MISSING="$MISSING KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ] && MISSING="$MISSING KEY_PASSWORD"
          [ -z "$ADMOB_APP_ID" ] && MISSING="$MISSING ADMOB_APP_ID"
          [ -z "$GEMINI_API_KEY" ] && MISSING="$MISSING GEMINI_API_KEY"
          if [ -n "$MISSING" ]; then
            echo "Missing Secrets:$MISSING" > build_errors.txt
            echo "has_errors=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi

      - name: Safe Injection (No Conflict Mode)
        run: |
          # 1. Pure text JSON file ko direct copy karna bina kisi decoding ke
          mkdir -p app/
          echo "$GOOGLE_SERVICES_JSON_TEXT" > app/google-services.json

          # 2. Local properties ko fresh handle karna bina project files ko chhede
          touch local.properties
          
          # 3. Multiple naming formats taaki unke kisi bhi variable name se match ho sake
          echo "admob.app.id=$ADMOB_APP_ID" >> local.properties
          echo "gemini.api.key=$GEMINI_API_KEY" >> local.properties
          echo "ADMOB_APP_ID=$ADMOB_APP_ID" >> local.properties
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> local.properties
          echo "admob_id=$ADMOB_APP_ID" >> local.properties
          echo "gemini_key=$GEMINI_API_KEY" >> local.properties

      - name: Grant Gradlew Permission
        run: chmod +x gradlew

      - name: Build Release APK
        if: github.event.inputs.build_type == 'apk'
        run: |
          set -eo pipefail
          ./gradlew clean assembleRelease 2>&1 | tee build_output.log

      - name: Build Release AAB
        if: github.event.inputs.build_type == 'aab'
        run: |
          set -eo pipefail
          ./gradlew clean bundleRelease 2>&1 | tee build_output.log

      - name: Upload APK
        if: github.event.inputs.build_type == 'apk' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-APK
          path: NexusPlus/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload AAB
        if: github.event.inputs.build_type == 'aab' && success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPlus-Release-AAB
          path: NexusPlus/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 7

      - name: Extract Build Errors
        if: failure()
        run: |
          echo "=== BUILD ERRORS ===" > build_errors.txt
          if [ -f build_output.log ]; then
            grep -i -E "error:|exception|failed|failure|compilation failed|execution failed" build_output.log >> build_errors.txt || true
          fi
          if [ ! -s build_errors.txt ]; then
            echo "No filtered errors found. Check build_output.log." >> build_errors.txt
          fi

      - name: Upload Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Errors
          path: NexusPlus/build_errors.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Full Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Build-Log
          path: NexusPlus/build_output.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup Signing Artifacts
        if: always()
        run: |
          rm -rf app/build/signing/ || true
