# GitHub Actions CI/CD has been fully replaced by the standalone
# Gradle task `autoGenerateKeystore` defined in app/build.gradle.kts.
#
# Build and sign a release APK without a laptop or terminal:
#   ./gradlew autoGenerateKeystore assembleRelease
#
# The task automatically generates release-keystore.jks if absent,
# reading credentials from environment variables or safe defaults.
# No .yml pipeline or GitHub Actions runner is required.
