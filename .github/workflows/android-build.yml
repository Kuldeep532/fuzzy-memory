name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NexusPlus

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject google-services.json
        working-directory: NexusPlus/app
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Inject keystore file
        working-directory: NexusPlus/app
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > nexusplus.keystore

      - name: Create local.properties with API keys
        run: |
          cat <<EOF > local.properties
          sdk.dir=$ANDROID_SDK_ROOT
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          SIGNING_STORE_FILE: nexusplus.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: NexusPlus/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: NexusPlus/app/build/outputs/apk/release/*.apk
