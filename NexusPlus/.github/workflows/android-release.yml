name: Android Release Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x NexusPlus/gradlew

      # ── Decode google-services.json from GitHub Secret ──────────────────────────
      # GOOGLE_SERVICES_JSON must be the Base64-encoded contents of your
      # Firebase google-services.json file (Settings → Secrets and variables → Actions).
      - name: Decode google-services.json
        working-directory: NexusPlus/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "ERROR: GOOGLE_SERVICES_JSON secret is not set."
            echo "Base64-encode your google-services.json and add it as a GitHub Secret."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > google-services.json
          echo "google-services.json written ($(wc -c < google-services.json) bytes)"

      # ── Decode release signing keystore from GitHub Secret ──────────────────────
      - name: Decode release keystore
        working-directory: NexusPlus
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p app/signing
            echo "$KEYSTORE_BASE64" | base64 -d > app/signing/release-keystore.jks
            echo "Release keystore decoded."
          else
            echo "WARNING: KEYSTORE_BASE64 not set — release build will use debug signing."
          fi

      # ── Build release APK ───────────────────────────────────────────────────────
      # All secrets are injected as environment variables and picked up by
      # app/build.gradle.kts via providers.environmentVariable().
      - name: Build release APK
        working-directory: NexusPlus
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          BANNER_AD_UNIT_ID: ${{ secrets.BANNER_AD_UNIT_ID }}
          INTERSTITIAL_AD_UNIT_ID: ${{ secrets.INTERSTITIAL_AD_UNIT_ID }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-plus-release-apk
          path: NexusPlus/app/build/outputs/apk/release/*.apk

      - name: Run unit tests
        working-directory: NexusPlus
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: ./gradlew test
